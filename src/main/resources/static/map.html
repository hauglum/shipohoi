<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ship Tracks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 100vh; }
        #status { position: absolute; top: 10px; right: 10px; z-index: 1000;
                  background: white; padding: 6px 12px; border-radius: 4px;
                  box-shadow: 0 1px 4px rgba(0,0,0,0.3); font-size: 13px; }
    </style>
</head>
<body>
<div id="map"></div>
<div id="status">Loading…</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([62, 8], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const colors = ['#e41a1c','#377eb8','#4daf4a','#984ea3','#ff7f00','#a65628'];
    let colorIndex = 0;
    const layers = {};

    function projectPoint(lat, lon, speedKnots, courseDeg) {
        if (speedKnots == null || courseDeg == null || speedKnots < 0.5) return null;
        const R = 6371000;
        const d = speedKnots * 1852;
        const θ = courseDeg * Math.PI / 180;
        const φ1 = lat * Math.PI / 180;
        const λ1 = lon * Math.PI / 180;
        const φ2 = Math.asin(Math.sin(φ1) * Math.cos(d / R) + Math.cos(φ1) * Math.sin(d / R) * Math.cos(θ));
        const λ2 = λ1 + Math.atan2(Math.sin(θ) * Math.sin(d / R) * Math.cos(φ1), Math.cos(d / R) - Math.sin(φ1) * Math.sin(φ2));
        return [φ2 * 180 / Math.PI, λ2 * 180 / Math.PI];
    }

    async function loadTracks() {
        const status = document.getElementById('status');
        try {
            const mmsis = await fetch('/api/tracks').then(r => r.json());
            status.textContent = `Tracking ${mmsis.length} ship(s)`;

            for (const mmsi of mmsis) {
                const geojson = await fetch(`/api/tracks/${mmsi}`).then(r => r.json());
                const feature = geojson.features[0];
                const coords = feature.geometry.coordinates;

                if (coords.length < 2) continue;

                const latLngs = coords.map(c => [c[1], c[0]]);
                const { name, pointCount, speed, course } = feature.properties;
                const color = colors[colorIndex++ % colors.length];

                if (layers[mmsi]) map.removeLayer(layers[mmsi]);

                const lastPos = latLngs[latLngs.length - 1];
                const speedLabel = speed != null ? `${speed.toFixed(1)} kn` : 'n/a';
                const courseLabel = course != null ? `${Math.round(course)}°` : 'n/a';

                const line = L.polyline(latLngs, { color, weight: 3, opacity: 0.8 })
                    .bindPopup(`<b>${name}</b><br>MMSI: ${mmsi}<br>Points: ${pointCount}`)
                    .addTo(map);

                L.circleMarker(lastPos, { radius: 6, color, fillOpacity: 1 })
                    .bindPopup(`<b>${name}</b><br>Speed: ${speedLabel}<br>Course: ${courseLabel}`)
                    .addTo(map);

                const projected = projectPoint(lastPos[0], lastPos[1], speed, course);
                if (projected) {
                    L.polyline([lastPos, projected], { color, weight: 2, opacity: 0.6, dashArray: '6 4' })
                        .bindPopup(`<b>${name}</b><br>Projected position in 1 hour at ${speedLabel}`)
                        .addTo(map);
                }

                layers[mmsi] = line;
            }
        } catch (e) {
            status.textContent = 'Error loading tracks';
            console.error(e);
        }
    }

    loadTracks();
    setInterval(loadTracks, 60000);
</script>
</body>
</html>
